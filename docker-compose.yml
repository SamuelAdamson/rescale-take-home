name: rescale-take-home
services:

  db:
    image: postgres:17-alpine
    networks:
      - internal-network
    environment:
      POSTGRES_DB: ${DB_NAME:-hpc_jobs}
      POSTGRES_USER: ${DB_USER:-rescale}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-rescale}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rescale} -d ${DB_NAME:-hpc_jobs}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: backend
      target: production
    networks:
      - internal-network
      - app-network
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,backend,frontend}
      DB_NAME: ${DB_NAME:-hpc_jobs}
      DB_USER: ${DB_USER:-rescale}
      DB_PASSWORD: ${DB_PASSWORD:-rescale}
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: frontend
      target: production
    networks:
      - app-network
    environment:
      VITE_API_HOST: ${VITE_API_HOST:-localhost}
      VITE_API_PORT: ${VITE_API_PORT:-8000}
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost/"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ── Test runners (docker compose run backend-test / frontend-test) ──────────

  backend-test:
    build:
      context: backend
      target: test
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DEBUG: ${DEBUG:-True}
    profiles:
      - test

  frontend-test:
    build:
      context: frontend
      target: test
    environment:
      VITE_API_HOST: ${VITE_API_HOST:-localhost}
      VITE_API_PORT: ${VITE_API_PORT:-8000}
    profiles:
      - test

  e2e-test:
    build:
      context: e2e
    environment:
      BASE_URL: http://frontend
      CI: "true"
    depends_on:
      frontend:
        condition: service_healthy
    networks:
      - app-network
    profiles:
      - test

volumes:
  postgres_data:

networks:
  internal-network:
    internal: true
  app-network:
